<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luca Stringer's Short Stories</title>
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <style>
        /* CSS Variables for the Theme */
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --accent-color: #555555;
            --border-color: #e0e0e0;
            --card-bg: #fdfdfd;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        /* Header Style inspired by lucastringer.com */
        header {
            padding: 60px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background-color: #fafafa;
        }

        h1 {
            font-family: "Times New Roman", Times, serif;
            font-size: 2.5rem;
            font-weight: normal;
            margin: 0;
            letter-spacing: 1px;
        }

        .subtitle {
            color: var(--accent-color);
            font-size: 1rem;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Grid Layout */
        .container {
            max-width: 1100px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .story-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 50px;
        }

        .story-card {
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
        }

        /* The Thumbnail Link */
        .story-link {
            text-decoration: none;
            color: inherit;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 1 / 1; /* Square look like the design elements */
            object-fit: cover;
            border: 1px solid var(--border-color);
            background-color: #eee;
            margin-bottom: 15px;
            transition: opacity 0.3s ease;
        }

        .story-link:hover .thumbnail {
            opacity: 0.8;
        }

        .story-title {
            font-family: "Times New Roman", Times, serif;
            font-size: 1.4rem;
            margin-bottom: 10px;
            border-bottom: 1px solid transparent;
            display: inline-block;
        }

        .story-link:hover .story-title {
            border-bottom: 1px solid var(--text-color);
        }

        /* Audio Player Styling */
        .audio-section {
            margin-top: auto;
            padding-top: 15px;
        }

        .audio-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            margin-bottom: 8px;
            display: block;
        }

        audio {
            width: 100%;
            height: 35px;
            filter: grayscale(1); /* Keeps the player looking minimalist and professional */
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.8rem;
            color: var(--accent-color);
            border-top: 1px solid var(--border-color);
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Luca Stringer's Short Stories</h1>
        <div class="subtitle">Author & Storyteller</div>
    </header>

    <div class="container">
        <main class="story-grid">
            
            <article class="story-card">
                <a href="pdfs/The Blast _ Short Story By Luca Stringer.pdf" target="_blank" class="story-link">
                    <img src="images/thumb1.png" alt="The First Story" class="thumbnail">
                    <div class="story-title">The Blast</div>
                </a>
                <div class="audio-section">
                    <span class="audio-label">Audio Version</span>
                    <audio controls>
                        <source src="audio/story1.mp3" type="audio/mpeg">
                    </audio>
                </div>
            </article>

        </main>
    </div>

    <footer>
        &copy; 2026 Luca Stringer | All Rights Reserved
    </footer>

</body>
</html>
